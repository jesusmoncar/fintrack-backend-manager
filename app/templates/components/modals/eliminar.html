<!-- Modal para eliminar inversión -->
<div class="modal fade" id="modalEliminar{{ inv[0] }}" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">⚠️ Confirmar Eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger">
                    <strong>¿Estás seguro de eliminar esta inversión?</strong>
                </div>
                <p><strong>Activo:</strong> {{ inv[1] }}</p>
                <p><strong>Inversión Total:</strong> €{{ "%.2f"|format(inv[5]) }}</p>
                <p class="text-danger">
                    <i class="bi bi-exclamation-triangle"></i> 
                    Esta acción eliminará la inversión y TODO su historial de precios. 
                    <strong>No se puede deshacer.</strong>
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x-circle"></i> Cancelar
                </button>
                <form method="POST" action="{{ url_for('inversiones.eliminar', id=inv[0]) }}" style="display:inline;">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Sí, Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
